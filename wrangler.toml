name = "ggu-web"
main = ".output/server/index.mjs"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".output/public"
binding = "ASSETS"

[build]
command = "pnpm exec nuxt build --preset=cloudflare_module"

[vars]
NUXT_PUBLIC_MAIL_API_BASE_URL = "https://mail.ggu.edu.kg/api"
